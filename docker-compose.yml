version: '3.8'

services:
  db:
    build: ./db
    container_name: todo-db
    env_file:
      - postgres.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./app
    container_name: todo-web
    ports:
      - "8000:8000"
    env_file:
      - app.env
    depends_on:
      db:
        condition: service_healthy

networks:
  todo-network:
    driver: bridge

volumes:
  postgres-data: