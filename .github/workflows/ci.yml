name: CI/CD Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  #Проверка сборки
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r app/src/requirements.txt
      - name: Check app builds
        run: |
          cd app/src
          python -c "from main import app; print('Build OK')"

  #Линтер
  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run linter
        run: ruff check app/src

  #Тесты с coverage
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r app/src/requirements.txt
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=app/src --cov-fail-under=50 --cov-report=html
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  #Сборка Docker образа
  docker_build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t todo-app:${GITHUB_SHA::7} ./app
          echo "Docker image built: todo-app:${GITHUB_SHA::7}"

  #Push в Docker Hub
  docker_push:
    runs-on: ubuntu-latest
    needs: docker_build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKER_IMAGE }}:${GITHUB_SHA::7} ./app
          docker tag ${{ secrets.DOCKER_IMAGE }}:${GITHUB_SHA::7} ${{ secrets.DOCKER_IMAGE }}:latest
          docker push ${{ secrets.DOCKER_IMAGE }}:${GITHUB_SHA::7}
          docker push ${{ secrets.DOCKER_IMAGE }}:latest
          echo "Pushed to Docker Hub"